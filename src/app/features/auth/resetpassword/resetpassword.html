<div class="reset-page d-flex justify-content-center align-items-center min-vh-100">
  
  <div class="reset-card col-11 col-sm-8 col-md-6 col-lg-4">
    
    <!-- Banner -->
    <div class="reset-banner text-center p-4">
      <div class="icon-circle mx-auto mb-3">
        <!-- icon here -->
      </div>
      <h3 class="text-white">Reset Password</h3>
      <p class="text-white">Enter your new password below</p>
    </div>

    <!-- Form fields -->
    <div class="form-fields p-4">
      <label for="new-password" class="form-label">NEW PASSWORD</label>
      <input type="password" id="new-password" class="form-control mb-3">

      <label for="confirm-password" class="form-label">CONFIRM PASSWORD</label>
      <input type="password" id="confirm-password" class="form-control mb-3">

      <button (click)="onResetPassword()" class="btn reset-btn w-100 mt-2" >Reset Password →</button>
    </div>

  </div>
</div>
