<div class="forgot-page d-flex justify-content-center align-items-center min-vh-100">
  
  <div class="forgot-card col-11 col-sm-8 col-md-6 col-lg-4">
    
    <!-- Banner -->
    <div class="forgot-banner text-center p-4">
      <div class="icon-circle mx-auto mb-3">
        <!-- icon here -->
      </div>
      <h3 class="text-white">Forgot Password</h3>
      <p class="text-white">Enter your email to reset your password</p>
    </div>

    <!-- Form fields -->
    <div class="form-fields p-4">
      <label for="email" class="form-label">EMAIL ADDRESS</label>
      <input type="email" id="email" class="form-control mb-3">

      <button class="btn forgot-btn w-100 mt-2">Send Reset Link →</button>
    </div>

    <div class="login-redirect text-center pb-3">
      <p>Remembered your password? <a href="#">Sign In</a></p>
    </div>

  </div>
</div>
