<div class="register-form-page d-flex justify-content-center align-items-center min-vh-100">

  <div class="register-card col-11 col-sm-8 col-md-6 col-lg-4">

    <!-- Banner -->
    <div class="register-banner text-center p-4">
      <div class="icon-circle mx-auto mb-3">
        <!-- icon -->
      </div>
      <h3 class="text-white">Create Account</h3>
      <p class="text-white">Register as User Type 1</p>
    </div>

    <!-- Form fields unique to User Type 1 -->
    <div class="form-fields p-4">
      <label for="fullname" class="form-label">FULL NAME</label>
      <input type="text" id="fullname" class="form-control mb-3">

      <label for="email" class="form-label">EMAIL ADDRESS</label>
      <input type="email" id="email" class="form-control mb-3">

      <label for="password" class="form-label">PASSWORD</label>
      <input type="password" id="password" class="form-control mb-3">

      <!-- Add whatever fields are unique to this user type -->

      <button class="btn register-btn w-100 mt-2">Create Account →</button>
    </div>

    <div class="text-center pb-3">
      <p>Already have an account? <a href="#">Sign In</a></p>
    </div>

  </div>
</div>
