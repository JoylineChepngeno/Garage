<div class="contact-section px-4 py-5">

  <div class="text-center mb-4">
    <span class="contact-pill">CONTACT US</span>
    <h2 class="contact-title mt-2">Get in touch</h2>
    <p class="contact-sub">We would love to hear from you</p>
  </div>

  <div class="contact-form mx-auto">
    <div class="row g-3">

      <div class="col-12 col-md-6">
        <label class="contact-label">YOUR NAME</label>
        <input type="text" class="contact-input form-control" placeholder="Jane Doe">
      </div>

      <div class="col-12 col-md-6">
        <label class="contact-label">EMAIL ADDRESS</label>
        <input type="email" class="contact-input form-control" placeholder="jane@email.com">
      </div>

      <div class="col-12">
        <label class="contact-label">MESSAGE</label>
        <textarea class="contact-input form-control" rows="4" placeholder="Tell us how we can help..."></textarea>
      </div>

      <div class="col-12 text-center mt-2">
        <button class="btn contact-btn">Send message →</button>
      </div>

    </div>
  </div>

</div>
